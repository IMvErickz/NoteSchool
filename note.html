<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./graduation-cap 1.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="./css/notes.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
    <title>Notes</title>
</head>
<body>
<header>
    <nav>
        <div class="nav-wrapper">
            <a href="./inicio.html" class="brand-logo"><img src="./incons/Logo_Note-removebg-preview.png" alt="" width="190px"></a>

            <ul id="nav-mobile" class="right hide-on-med-and-down">
                <li><a href="./pomodoro.html"><img id="inconsNav" src="./incons/pomodoro.png" alt=""></a></li>
                <li><a href="./To-do.html"><img id="inconsNav" src="./incons/to-do-list.png" alt=""></a></li>
                <li><a id="buttonNew" class="waves-effect waves-light btn">Novo card</a></li>
                <li><strong id="prof">Olá, <span id="spanName"></span></strong></li>
            </ul>
        </div>
    </nav>
</header>

<div>
    <div class="row">
        <div class="col s12 m3">
            <div id="card" class="card grey darken-3">
                <div class="card-content white-text">
                    <span name="tittleNote" id="buttonCard" class="card-title"></span>
                    <p><span id="descrition"></span></p>
                </div>
                <div id="withButton" class="card-action">
                    
                    <button id="button" type="button" class="buttonCard" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
                        Abrir
                    </button>
                    <a class="buttonCard" id="exclude" href="#">Excluir</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Button trigger modal -->




<!-- Modal -->
<div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
    aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="staticBackdropLabel">Escreva sua nota</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <label for="name">Título da nota</label>
                <input id="tittle" type="text">

                <label for="name">Comentário da nota</label>
                <input id="coment" type="text"> <br> <br>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                <button id="button" type="button" class="btn btn-primary">Confirmar</button>
            </div>
        </div>
    </div>
</div>
</body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script src="./src/note.js"></script>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <!-- JavaScript Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"

        crossorigin="anonymous"></script>

</html>
