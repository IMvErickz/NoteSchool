<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./graduation-cap 1.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>Login</title>
</head>
<body>
    <header>
        <nav id="navBar">
            <div class="nav-wrapper">
                <a id="tittle" class="brand-logo center">Login</a>
            </div>
        </nav>
    </header>
<div id="principal">
    <fieldset id="field">
        <div class="row">
            <div class="input-field col s12">
                <input id="email" type="email" class="validate">
                <label for="email">Email</label>
            </div>
        </div>

        <div class="row">
            <div class="input-field col s12">
                <input id="password" type="password" class="validate">
                <label for="password">Password</label>
            </div>
        </div>

        <div id="buttonEnviar">
            <button class="btn waves-effect waves-light" type="submit" name="action" id="button" >Enviar</button>
        </div>

    </fieldset>
</div>
<div id="linkCad">
    <a id="aink" href="Cadastro.html">Não tem conta? Cadastre-se aqui</a>
</div>
</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script src="/src/login.js"></script>
</html>
